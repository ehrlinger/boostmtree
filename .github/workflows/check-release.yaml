# CRAN submission pre-flight check.
# Runs the full --as-cran gauntlet on a published GitHub release tag.
# Mirrors what CRAN's win-builder and macOS builders will do.
#
# Trigger manually via workflow_dispatch or automatically on release publication.
on:
  release:
    types: [published]
  workflow_dispatch:

name: CRAN-release-check

permissions: read-all

jobs:
  cran-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }}) [--as-cran]

    strategy:
      fail-fast: false
      matrix:
        config:
          # Mirror the platforms CRAN actually checks
          - {os: windows-latest,  r: 'release'}
          - {os: windows-latest,  r: 'devel'}
          - {os: macos-latest,    r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_CRAN_INCOMING_: true
      _R_CHECK_CRAN_INCOMING_REMOTE_: true
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-tinytex@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: 'c("--no-manual", "--as-cran")'
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cran-check-${{ matrix.config.os }}-${{ matrix.config.r }}
          path: check
