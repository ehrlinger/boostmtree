# Spell-check package documentation, vignettes, and README.
# CRAN rejects packages with misspelled words in documentation.
# To add words to the allow-list, add them to inst/WORDLIST (one word per line).
on:
  push:
    branches: [main, master, 'docs/**', 'feature/**', 'fix/**', 'release/**']
  pull_request:

name: spelling

permissions: read-all

jobs:
  spelling:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::spelling
          needs: check

      - name: Spell check
        run: spelling::spell_check_package(use_wordlist = TRUE)
        shell: Rscript {0}
