url: https://ehrlinger.github.io/boostmtree/

template:
  bootstrap: 5
  bslib:
    bootswatch: zephyr
    base_font: {google: "Outfit"}
    code_font: {google: "Fira Code"}
  light-switch: true
  theme: atom-one-light
  theme-dark: atom-one-dark

home:
  title: "boostmtree — Boosted Multivariate Trees for Longitudinal Data"
  description: >
    Gradient descent boosting for longitudinal response data using multivariate
    tree base learners and penalized B-splines for covariate-time interactions.
    Supports continuous, binary, nominal, and ordinal responses.
  sidebar:
    structure: [badges, links, authors]
    components:
      badges:
        title: Package Status
        text: |
          [![R-CMD-check](https://github.com/ehrlinger/boostmtree/actions/workflows/R-CMD-check.yaml/badge.svg)](https://github.com/ehrlinger/boostmtree/actions/workflows/R-CMD-check.yaml)<br>
          [![codecov](https://codecov.io/gh/ehrlinger/boostmtree/graph/badge.svg)](https://app.codecov.io/gh/ehrlinger/boostmtree)<br>
          [![License: GPL (&gt;= 3)](https://img.shields.io/badge/License-GPL%20(%3E%3D%203)-blue.svg)](https://www.gnu.org/licenses/gpl-3.0)<br>
          [![Lifecycle: stable](https://img.shields.io/badge/lifecycle-stable-brightgreen.svg)](https://lifecycle.r-lib.org/articles/stages.html#stable)<br>
          ![GitHub version](https://img.shields.io/github/r-package/v/ehrlinger/boostmtree)
      links:
        title: Links
        text: |
          [Browse source code](https://github.com/ehrlinger/boostmtree)<br>
          [Report a bug](https://github.com/ehrlinger/boostmtree/issues)

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github, my_linkedin, lightswitch]
  components:
    intro:
      text: Get Started
      href: articles/introduction.html
    articles:
      text: Articles
      menu:
        - text: Introduction to boostmtree
          href: articles/introduction.html
        - text: Longitudinal Data Analysis
          href: articles/longitudinal-analysis.html
    my_linkedin:
      icon: fa-linkedin
      href: https://www.linkedin.com/in/ehrlinger/
      aria-label: LinkedIn

footer:
  structure:
    left: developed_by
    right: built_with_pkgdown
  components:
    developed_by: "John Ehrlinger"
    built_with_pkgdown: "This site was built using [pkgdown](https://pkgdown.r-lib.org/)!&nbsp;&nbsp;<img src='https://pkgdown.r-lib.org/logo.png' alt='pkgdown logo' width='25'>"

reference:
  - title: "Core Modelling"
    desc: >
      Fit and predict boosted multivariate tree models for longitudinal data.
    contents:
      - boostmtree
      - predict.boostmtree
      - plot.profile.prx

  - title: "Model Inspection"
    desc: >
      Print summaries and produce diagnostic plots for fitted models.
    contents:
      - print.boostmtree
      - plot.boostmtree

  - title: "Variable Importance"
    desc: >
      Compute and visualise permutation-based variable importance scores.
    contents:
      - vimp.boostmtree
      - vimpPlot

  - title: "Dependence Plots"
    desc: >
      Explore covariate effects via marginal and partial dependence plots.
    contents:
      - marginalPlot
      - partialPlot

  - title: "Data Simulation"
    desc: >
      Generate synthetic longitudinal datasets for benchmarking and testing.
    contents:
      - simLong

  - title: "Datasets"
    desc: >
      Real-world longitudinal datasets bundled with the package.
    contents:
      - AF
      - spirometry

  - title: "Package"
    desc: Package-level documentation and utilities.
    contents:
      - boostmtree-package
      - boostmtree.news

news:
  releases:
    - text: "Version 2.0.0"
      href: https://github.com/ehrlinger/boostmtree/releases/tag/v2.0.0
